<!-- Auth Modal -->

    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">

        <div class="fixed inset-0 transition-opacity bg-gray-500 dark:bg-gray-900 bg-opacity-75 dark:bg-opacity-80" onclick="closeAuthModal()"></div>

                <div id="signin-error" class="hidden text-sm text-red-600 dark:text-red-400"></div>
                <button type="submit" 
                        class="w-full py-2 px-4 bg-accent-500 text-white font-medium rounded-lg hover:bg-accent-600 transition-colors">
                    Iniciar sesión

            </form>
            
            <!-- Sign Up Form -->
            <form id="signup-form" class="hidden space-y-4">
                <div>
                    <label for="signup-email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                        Correo electrónico
                    </label>
                    <input type="email" id="signup-email" name="email" required
                           class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:ring-2 focus:ring-accent-500 focus:border-accent-500"
                           placeholder="tu@email.com">

                               placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('signup-password', this)"
                                class="absolute inset-y-0 right-0 px-3 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
                                aria-label="Mostrar contraseña" aria-pressed="false">
                            <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path class="password-eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>

                                <path class="password-eye-closed hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18M10.584 10.587A2 2 0 0012 14a2 2 0 001.414-.586M9.88 5.09A10.43 10.43 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.523 10.523 0 01-2.255 3.568M6.228 6.228A10.517 10.517 0 002.458 12a10.542 10.542 0 005.318 5.772"></path>

                        Confirmar contraseña

                        <input type="password" id="signup-password-confirm" name="password_confirm" required minlength="6"

                               placeholder="••••••••">
                        <button type="button" onclick="togglePasswordVisibility('signup-password-confirm', this)"
                                class="absolute inset-y-0 right-0 px-3 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
                                aria-label="Mostrar contraseña" aria-pressed="false">
                            <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path class="password-eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>

                                <path class="password-eye-closed hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18M10.584 10.587A2 2 0 0012 14a2 2 0 001.414-.586M9.88 5.09A10.43 10.43 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.523 10.523 0 01-2.255 3.568M6.228 6.228A10.517 10.517 0 002.458 12a10.542 10.542 0 005.318 5.772"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="signup-error" class="hidden text-sm text-red-600 dark:text-red-400"></div>
                <button type="submit"
                        class="w-full py-2 px-4 bg-accent-500 text-white font-medium rounded-lg hover:bg-accent-600 transition-colors">
                    Crear cuenta
                </button>
            </form>
            
            <!-- Info about local storage -->
            <div class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
                <p class="text-xs text-gray-500 dark:text-gray-400 text-center">
                    💡 Tus datos se guardan localmente. Crea una cuenta para sincronizarlos en la nube.
                </p>
            </div>
        </div>
    </div>
</div>

<script>
// Auth state
let currentUser = null;
let authSession = null;
const SYNC_LOCAL_UPDATED_AT_KEY = 'uniapp_localUpdatedAt';
const SYNC_LAST_CLOUD_SYNC_AT_KEY = 'uniapp_lastCloudSyncAt';
const SYNC_PENDING_KEY = 'uniapp__pendingSync';

// Auth modal functions
function openAuthModal() {
    document.getElementById('authModal').classList.remove('hidden');
    // Reset forms
    document.getElementById('signin-form').reset();
    document.getElementById('signup-form').reset();
    resetPasswordVisibility();
    hideAuthErrors();
}

function closeAuthModal() {
    document.getElementById('authModal').classList.add('hidden');
    hideAuthErrors();
}

function hideAuthErrors() {
    document.getElementById('signin-error').classList.add('hidden');
    document.getElementById('signup-error').classList.add('hidden');
}

function showError(formType, message) {
    const errorEl = document.getElementById(`${formType}-error`);
    errorEl.textContent = message;
    errorEl.classList.remove('hidden');
}

function togglePasswordVisibility(inputId, buttonEl) {
    const input = document.getElementById(inputId);
    if (!input || !buttonEl) return;

    const isVisible = input.type === 'text';
    input.type = isVisible ? 'password' : 'text';
    buttonEl.setAttribute('aria-pressed', String(!isVisible));
    buttonEl.setAttribute('aria-label', isVisible ? 'Mostrar contraseña' : 'Ocultar contraseña');

    buttonEl.querySelectorAll('.password-eye-open').forEach((el) => el.classList.toggle('hidden', !isVisible));
    buttonEl.querySelectorAll('.password-eye-closed').forEach((el) => el.classList.toggle('hidden', isVisible));
}

function resetPasswordVisibility() {
    ['signin-password', 'signup-password', 'signup-password-confirm'].forEach((inputId) => {
        const input = document.getElementById(inputId);
        if (input) input.type = 'password';
    });

    document.querySelectorAll('#authModal button[aria-pressed]').forEach((buttonEl) => {
        buttonEl.setAttribute('aria-pressed', 'false');
        buttonEl.setAttribute('aria-label', 'Mostrar contraseña');
        buttonEl.querySelectorAll('.password-eye-open').forEach((el) => el.classList.remove('hidden'));
        buttonEl.querySelectorAll('.password-eye-closed').forEach((el) => el.classList.add('hidden'));
    });
}

function switchAuthTab(tab) {
    const signinForm = document.getElementById('signin-form');
    const signupForm = document.getElementById('signup-form');
    const tabSignin = document.getElementById('tab-signin');
    const tabSignup = document.getElementById('tab-signup');
    
    hideAuthErrors();
    
    if (tab === 'signin') {
        signinForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        tabSignin.classList.add('border-accent-500', 'text-accent-600');
        tabSignin.classList.remove('border-transparent', 'text-gray-500');
        tabSignup.classList.remove('border-accent-500', 'text-accent-600');
        tabSignup.classList.add('border-transparent', 'text-gray-500');
    } else {
        signinForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        tabSignup.classList.add('border-accent-500', 'text-accent-600');
        tabSignup.classList.remove('border-transparent', 'text-gray-500');
        tabSignin.classList.remove('border-accent-500', 'text-accent-600');
        tabSignin.classList.add('border-transparent', 'text-gray-500');
    }
}

function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.toggle('hidden');
}

// Toggle user dropdown menu
function toggleUserMenu() {
    const menu = document.getElementById('user-menu');
    menu.classList.toggle('hidden');
}

// Close user menu when clicking outside
document.addEventListener('click', function(e) {
    const userMenu = document.getElementById('user-menu');
    const authButton = document.getElementById('auth-button');
    if (userMenu && !userMenu.contains(e.target) && !authButton.contains(e.target)) {
        userMenu.classList.add('hidden');
    }
});

// Sign In
document.getElementById('signin-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideAuthErrors();
    
    const email = document.getElementById('signin-email').value;
    const password = document.getElementById('signin-password').value;
    const submitBtn = this.querySelector('button[type="submit"]');
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="animate-pulse">Iniciando sesión...</span>';
    
    try {
        const response = await fetch('/api/auth/signin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok || data.error) {
            throw new Error(data.error || 'Error al iniciar sesión');
        }
        
        // Save auth data
        saveAuthData(data.user, data.session);
        
        // Update UI
        updateAuthUI(true, data.user.email);
        closeAuthModal();
        
        if (typeof App !== 'undefined' && App.showAlert) {
            App.showAlert('¡Bienvenido!', 'success');
        }
        
        // Optionally pull data from cloud
        await pullFromCloud();
        
    } catch (error) {
        showError('signin', error.message);
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Iniciar sesión';
    }
});

// Sign Up
document.getElementById('signup-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    hideAuthErrors();
    
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const passwordConfirm = document.getElementById('signup-password-confirm').value;
    const submitBtn = this.querySelector('button[type="submit"]');
    
    // Validate passwords match
    if (password !== passwordConfirm) {
        showError('signup', 'Las contraseñas no coinciden');
        return;
    }
    
    if (password.length < 6) {
        showError('signup', 'La contraseña debe tener al menos 6 caracteres');
        return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="animate-pulse">Creando cuenta...</span>';
    
    try {
        const response = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok || data.error) {
            throw new Error(data.error || 'Error al crear cuenta');
        }
        
        // Check if email confirmation is required
        if (data.user && !data.session) {
            if (typeof App !== 'undefined' && App.showAlert) {
                App.showAlert('¡Cuenta creada! Revisa tu correo para confirmar.', 'success');
            }
            closeAuthModal();
        } else if (data.session) {
            // Auto-login if no confirmation needed
            saveAuthData(data.user, data.session);
            updateAuthUI(true, data.user.email);
            closeAuthModal();
            
            if (typeof App !== 'undefined' && App.showAlert) {
                App.showAlert('¡Cuenta creada exitosamente!', 'success');
            }
            
            // Sync local data to cloud
            await syncToCloud();
        }
        
    } catch (error) {
        showError('signup', error.message);
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Crear cuenta';
    }
});

// Sign Out
async function signOut() {
    try {
        const token = authSession?.access_token;
        
        await fetch('/api/auth/signout', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            }
        });
        
    } catch (error) {
        console.error('Sign out error:', error);
    } finally {
        // Always clear local auth data
        clearAuthData();
        updateAuthUI(false);
        
        const userMenu = document.getElementById('user-menu');
        if (userMenu) userMenu.classList.add('hidden');
        
        if (typeof App !== 'undefined' && App.showAlert) {
            App.showAlert('Sesión cerrada', 'success');
        }
    }
}

// Refresh auth token
async function refreshAuthToken() {
    if (!authSession || !authSession.refresh_token) {
        console.log('No refresh token available');
        return false;
    }
    
    try {
        const response = await fetch('/api/auth/refresh', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                refresh_token: authSession.refresh_token
            })
        });
        
        const data = await response.json();
        
        if (response.ok && data.session) {
            // Update session with new tokens
            authSession.access_token = data.session.access_token;
            authSession.refresh_token = data.session.refresh_token;
            localStorage.setItem('auth_session', JSON.stringify(authSession));
            console.log('Token refreshed successfully');
            return true;
        } else {
            console.error('Failed to refresh token:', data.error);
            // If refresh token is invalid/used, session is expired - need to re-login
            if (data.error && (data.error.includes('Already Used') || data.error.includes('Invalid'))) {
                clearAuthData();
                updateAuthUI(false);
                if (typeof App !== 'undefined' && App.showAlert) {
                    App.showAlert('Tu sesión ha expirado. Por favor inicia sesión nuevamente.', 'warning');
                }
            }
            return false;
        }
    } catch (error) {
        console.error('Error refreshing token:', error);
        return false;
    }
}

// Save auth data to localStorage
function saveAuthData(user, session) {
    currentUser = user;
    authSession = session;
    localStorage.setItem('auth_user', JSON.stringify(user));
    localStorage.setItem('auth_session', JSON.stringify(session));
    
    // Initialize storage sync if available
    if (typeof storage !== 'undefined' && storage.initSync) {
        storage.initSync(null, user.id); // Pass null for supabase client, use REST API
    }
}

// Clear auth data
function clearAuthData() {
    currentUser = null;
    authSession = null;
    localStorage.removeItem('auth_user');
    localStorage.removeItem('auth_session');
}

// Load auth data on page load
function loadAuthData() {
    try {
        const userStr = localStorage.getItem('auth_user');
        const sessionStr = localStorage.getItem('auth_session');
        
        if (userStr && sessionStr) {
            currentUser = JSON.parse(userStr);
            authSession = JSON.parse(sessionStr);
            return true;
        }
    } catch (e) {
        console.error('Error loading auth data:', e);
        clearAuthData();
    }
    return false;
}

// Update UI based on auth state
function updateAuthUI(isLoggedIn, email = '') {
    const authButton = document.getElementById('auth-button');
    const authText = document.getElementById('auth-text');
    const userMenu = document.getElementById('user-menu');
    const userEmail = document.getElementById('user-email');
    
    if (isLoggedIn && email) {
        // Update button to show user is logged in
        authText.textContent = email.split('@')[0]; // Show username part
        authButton.onclick = toggleUserMenu;
        
        // Update user menu email
        if (userEmail) userEmail.textContent = email;
        
        // Position user menu relative to button
        if (userMenu) {
            userMenu.style.position = 'absolute';
            userMenu.style.top = '100%';
            userMenu.style.right = '0';
        }
    } else {
        authText.textContent = 'Iniciar sesión';
        authButton.onclick = openAuthModal;
        if (userMenu) userMenu.classList.add('hidden');
    }
}

function getParsedLocal(key, fallback) {
    try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
    } catch (error) {
        return fallback;
    }
}

function getPlanPrefix(planId) {
    return planId === 'default' ? '' : `${planId}_`;
}

function normalizePlans(rawPlans) {
    const validPlans = Array.isArray(rawPlans)
        ? rawPlans.filter((plan) => plan && typeof plan === 'object' && typeof plan.id === 'string')
        : [];

    return validPlans.length > 0
        ? validPlans
        : [{ id: 'default', nombre: 'Mi Plan de Estudios', descripcion: 'Plan de estudios base' }];
}

function hasSyncMetadata(syncMeta) {
    if (!syncMeta || typeof syncMeta !== 'object') return false;
    if (!Array.isArray(syncMeta.planes) || syncMeta.planes.length === 0) return false;
    if (!syncMeta.planesData || typeof syncMeta.planesData !== 'object') return false;
    return true;
}

function buildSyncMetadata() {
    const planes = getParsedLocal('uniapp_planes', []);
    const normalizedPlanes = normalizePlans(planes);
    const storedPlanPrincipal = localStorage.getItem('uniapp_planPrincipal') || 'default';
    const planPrincipal = normalizedPlanes.some((plan) => plan.id === storedPlanPrincipal)
        ? storedPlanPrincipal
        : (normalizedPlanes.some((plan) => plan.id === 'default') ? 'default' : normalizedPlanes[0].id);
    const storedPlanActivo = localStorage.getItem('uniapp_planActivo') || 'default';
    const planActivo = normalizedPlanes.some((plan) => plan.id === storedPlanActivo)
        ? storedPlanActivo
        : planPrincipal;
    const planesData = {};

    normalizedPlanes.forEach((plan) => {
        const planId = plan.id;
        const prefix = getPlanPrefix(planId);
        planesData[planId] = {
            materias: getParsedLocal(`uniapp_${prefix}materias`, []),
            clases: getParsedLocal(`uniapp_${prefix}clases`, []),
            calificaciones: getParsedLocal(`uniapp_${prefix}calificaciones`, [])
        };
    });

    return {
        version: 1,
        planes: normalizedPlanes,
        planPrincipal,
        planActivo,
        planesData
    };
}

function restorePlanData(syncMeta) {
    const planes = normalizePlans(syncMeta?.planes);
    const requestedPlanPrincipal = syncMeta?.planPrincipal || 'default';
    const planPrincipal = planes.some((plan) => plan.id === requestedPlanPrincipal)
        ? requestedPlanPrincipal
        : (planes.some((plan) => plan.id === 'default') ? 'default' : planes[0].id);
    const requestedPlanActivo = syncMeta?.planActivo || 'default';
    const planActivo = planes.some((plan) => plan.id === requestedPlanActivo)
        ? requestedPlanActivo
        : planPrincipal;
    const planesData = syncMeta?.planesData || {};

    localStorage.setItem('uniapp_planes', JSON.stringify(planes));
    localStorage.setItem('uniapp_planPrincipal', planPrincipal);
    localStorage.setItem('uniapp_planActivo', planActivo);

    planes.forEach((plan) => {
        const planId = plan.id;
        const prefix = getPlanPrefix(planId);
        const planData = planesData[planId] || {};

        localStorage.setItem(
            `uniapp_${prefix}materias`,
            JSON.stringify(Array.isArray(planData.materias) ? planData.materias : [])
        );
        localStorage.setItem(
            `uniapp_${prefix}clases`,
            JSON.stringify(Array.isArray(planData.clases) ? planData.clases : [])
        );
        localStorage.setItem(
            `uniapp_${prefix}calificaciones`,
            JSON.stringify(Array.isArray(planData.calificaciones) ? planData.calificaciones : [])
        );
    });
}

function parseDateMs(value) {
    const parsed = value ? Date.parse(value) : NaN;
    return Number.isNaN(parsed) ? null : parsed;
}

function getLatestCloudUpdatedAt(data) {
    if (data?._latest_updated_at) return data._latest_updated_at;

    const updatedAt = data?._updated_at || {};
    const validDates = Object.values(updatedAt)
        .map((value) => ({ value, ms: parseDateMs(value) }))
        .filter((date) => date.ms !== null)
        .sort((a, b) => b.ms - a.ms);

    return validDates[0]?.value || null;
}

function hasMeaningfulLocalData() {
    const syncMeta = buildSyncMetadata();
    const hasPlanData = Object.values(syncMeta.planesData).some((planData) => {
        return ['materias', 'clases', 'calificaciones'].some((key) => {
            const value = planData?.[key];
            return Array.isArray(value) && value.length > 0;
        });
    });
    const franjas = getParsedLocal('uniapp_franjas', []);
    const config = getParsedLocal('uniapp_configuracion', {});
    const hasConfig = config && typeof config === 'object' && !Array.isArray(config) &&
        Object.keys(config).some((key) => key !== '_sync_meta');

    return hasPlanData || (Array.isArray(franjas) && franjas.length > 0) || hasConfig;
}

function markCloudSyncTimestamp(timestamp = null) {
    const syncedAt = timestamp || new Date().toISOString();
    localStorage.setItem(SYNC_LAST_CLOUD_SYNC_AT_KEY, syncedAt);
    localStorage.setItem(SYNC_LOCAL_UPDATED_AT_KEY, syncedAt);
    localStorage.removeItem(SYNC_PENDING_KEY);
}

function hasPendingLocalSync() {
    const pendingSync = getParsedLocal(SYNC_PENDING_KEY, []);
    return Array.isArray(pendingSync) && pendingSync.length > 0;
}

function shouldApplyCloudData(data, hasCloudData) {
    if (!hasCloudData) return false;

    const hasLocalData = hasMeaningfulLocalData();
    if (!hasLocalData) return true;

    const cloudUpdatedAt = getLatestCloudUpdatedAt(data);
    const cloudMs = parseDateMs(cloudUpdatedAt);
    const localMs = parseDateMs(localStorage.getItem(SYNC_LOCAL_UPDATED_AT_KEY)) ||
        parseDateMs(localStorage.getItem(SYNC_LAST_CLOUD_SYNC_AT_KEY));

    if (cloudMs && !localMs) {
        return !hasPendingLocalSync();
    }

    if (!cloudMs) {
        console.log('No hay timestamps suficientes para reemplazar datos locales automáticamente.');
        return false;
    }

    return cloudMs > localMs + 1000;
}
// Sync local data to cloud
async function syncToCloud() {
    if (!currentUser || !authSession) {
        if (typeof App !== 'undefined' && App.showAlert) {
            App.showAlert('Inicia sesión para sincronizar', 'warning');
        }
        return;
    }
    
    try {
        // First, try to refresh the token to avoid JWT expired errors
        const refreshed = await refreshAuthToken();
        
        // If refresh failed and we no longer have a session, abort
        if (!refreshed && !authSession) {
            return;
        }
        
        const syncMeta = buildSyncMetadata();
        const activePlanData = syncMeta.planesData[syncMeta.planActivo] || {};
        const currentConfig = getParsedLocal('uniapp_configuracion', {});

        // Gather all local data - active plan for backward compatibility + metadata for all plans
        const localData = {
            user_id: currentUser.id,
            pensum: Array.isArray(activePlanData.materias) ? activePlanData.materias : [],
            clases: Array.isArray(activePlanData.clases) ? activePlanData.clases : [],
            calificaciones: Array.isArray(activePlanData.calificaciones) ? activePlanData.calificaciones : [],
            configuracion: {
                ...currentConfig,
                _sync_meta: syncMeta
            },
            franjas: getParsedLocal('uniapp_franjas', [])
        };
        
        console.log('Syncing data:', localData); // Debug log
        
        const response = await fetch('/api/sync', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authSession.access_token}`
            },
            body: JSON.stringify(localData)
        });
        
        const data = await response.json();
        
        if (!response.ok || data.error) {
            throw new Error(data.error || 'Error al sincronizar');
        }

        markCloudSyncTimestamp();
        
        if (typeof App !== 'undefined' && App.showAlert) {
            App.showAlert('Datos sincronizados ✓', 'success');
        }
        
    } catch (error) {
        console.error('Sync error:', error);
        if (typeof App !== 'undefined' && App.showAlert) {
            App.showAlert('Error al sincronizar: ' + error.message, 'error');
        }
    }
}

// Pull data from cloud
async function pullFromCloud() {
    if (!currentUser || !authSession) return;
    
    try {
        // Refresh token first
        await refreshAuthToken();
        
        const response = await fetch(`/api/sync/pull?user_id=${currentUser.id}`, {
            headers: {
                'Authorization': `Bearer ${authSession.access_token}`
            }
        });
        
        const result = await response.json();
        
        if (!response.ok || result.error) {
            console.error('Pull error:', result.error);
            return;
        }
        
        const data = result.data || {};
        const syncMeta = data.configuracion?._sync_meta;
        const cloudUpdatedAt = getLatestCloudUpdatedAt(data);
        
        // Check if cloud has data
        const hasCloudData = (Array.isArray(data.pensum) && data.pensum.length > 0) ||
            (Array.isArray(data.clases) && data.clases.length > 0) ||
            (Array.isArray(data.calificaciones) && data.calificaciones.length > 0) ||
            (data.configuracion && Object.keys(data.configuracion).length > 0) ||
            (Array.isArray(data.franjas) && data.franjas.length > 0) ||
            (data._updated_at && Object.keys(data._updated_at).length > 0) ||
            hasSyncMetadata(syncMeta);

        if (!shouldApplyCloudData(data, hasCloudData)) return;
        
        if (hasCloudData) {
            // Import cloud data for all plans if sync metadata is available
            if (hasSyncMetadata(syncMeta)) {
                restorePlanData(syncMeta);
            } else {
                if ('pensum' in data) localStorage.setItem('uniapp_materias', JSON.stringify(data.pensum));
                if ('clases' in data) localStorage.setItem('uniapp_clases', JSON.stringify(data.clases));
                if ('calificaciones' in data) localStorage.setItem('uniapp_calificaciones', JSON.stringify(data.calificaciones));
            }

            if ('configuracion' in data && data.configuracion && typeof data.configuracion === 'object') {
                const { _sync_meta, ...cleanConfig } = data.configuracion;
                localStorage.setItem('uniapp_configuracion', JSON.stringify(cleanConfig));
            }

            if ('franjas' in data) localStorage.setItem('uniapp_franjas', JSON.stringify(data.franjas));

            markCloudSyncTimestamp(cloudUpdatedAt);
            
            // Reload page to reflect changes
            window.location.reload();
        }
        
    } catch (error) {
        console.error('Pull error:', error);
    }
}

// Initialize auth on page load
document.addEventListener('DOMContentLoaded', function() {
    if (loadAuthData()) {
        updateAuthUI(true, currentUser.email);
        pullFromCloud();
    }
});
</script>
